name: GitMind — Auto Update MIND.md

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gitmind-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install gitclaw
        run: npm install gitclaw

      - name: Generate MIND.md
        env:
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          npx gitclaw --dir gitmind "Scan this repository and write MIND.md" < /dev/null || true

      - name: Fallback MIND.md if not created
        run: |
          if [ ! -f MIND.md ]; then
            cat > MIND.md << 'MINDEOF'
          # 🧠 GitMind Report
          MINDEOF
            echo "" >> MIND.md
            echo "> Last updated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> MIND.md
            echo "> Powered by GitMind v0.1.0" >> MIND.md
            echo "" >> MIND.md
            echo "## 🗺️ Repo Map" >> MIND.md
            find . -type f -not -path './.git/*' -not -path './node_modules/*' -not -path './gitmind/*' | sort >> MIND.md
            echo "" >> MIND.md
            echo "## 🔍 Recent Changes" >> MIND.md
            git log --oneline -10 >> MIND.md
            echo "" >> MIND.md
            echo "## 👥 Contributors" >> MIND.md
            git shortlog --summary --numbered >> MIND.md
            echo "" >> MIND.md
            echo "> AI-generated by GitMind v0.1.0" >> MIND.md
          fi

      - name: Commit MIND.md
        run: |
          git config --local user.email "gitmind-bot@github.com"
          git config --local user.name "GitMind Bot"
          git fetch origin main
          git checkout main
          git add MIND.md gitmind/.gitagent/ || true
          git diff --staged --quiet || git commit -m "🧠 GitMind: auto-update MIND.md [skip ci]"
          git push origin main