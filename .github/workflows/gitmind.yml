name: GitMind — Auto Update MIND.md

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gitmind-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate MIND.md with GitMind AI
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          # Collect repo data
          find . -type f \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './gitmind/node_modules/*' \
            -not -path './.idea/*' \
            | sort | head -100 > /tmp/tree.txt

          git log --oneline -15 > /tmp/gitlog.txt
          git shortlog --summary --numbered > /tmp/contributors.txt
          git log --stat -3 > /tmp/recent.txt

          grep -rn "TODO\|FIXME\|HACK" \
            --include="*.ts" --include="*.js" \
            --include="*.dart" --include="*.py" \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=gitmind \
            . 2>/dev/null | head -20 > /tmp/todos.txt || true

          README=""
          [ -f README.md ] && README=$(head -50 README.md)

          PKG=""
          [ -f package.json ] && PKG=$(cat package.json)

          BACKEND_PKG=""
          [ -f backend/package.json ] && BACKEND_PKG=$(cat backend/package.json)

          # Write prompt to file
          cat > /tmp/gitmind-prompt.txt << PROMPTEOF
          You are GitMind — the living brain of a git repository.
          You are a warm, senior engineer who has read every file and commit.
          Always cite sources. Always give confidence levels.
          Analyze this repository and write a complete MIND.md report.

          REPOSITORY FILES:
          $(cat /tmp/tree.txt)

          README:
          $README

          ROOT PACKAGE.JSON:
          $PKG

          BACKEND PACKAGE.JSON:
          $BACKEND_PKG

          GIT LOG (last 15 commits):
          $(cat /tmp/gitlog.txt)

          CONTRIBUTORS:
          $(cat /tmp/contributors.txt)

          RECENT CHANGES WITH STATS:
          $(cat /tmp/recent.txt)

          TODOS AND FIXMES FOUND:
          $(cat /tmp/todos.txt)

          Write a complete MIND.md with exactly these sections:
          # 🧠 GitMind Report
          > Last updated: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          > Overall Confidence: High
          > Powered by GitMind v0.1.0 — GitAgent standard

          ## 🗺️ Repo Map
          Describe overall structure and what each major folder does.

          ## 🔧 Tech Stack
          Identify all languages frameworks tools. Cite sources.

          ## 📁 Folder Purposes
          Explain each top-level folder in plain English.

          ## 📦 Key Dependencies
          List important dependencies and what they do.

          ## 🔐 Sensitive File Flags
          Flag any .env secrets or sensitive files.

          ## 🔍 Recent Changes
          Summarize last 15 commits in plain English with hashes.

          ## 🔥 Active Areas
          Which parts are being changed most?

          ## 🧊 Stale Areas
          Which parts have not been touched recently?

          ## 👥 Contributors
          Who contributed and what is each person working on?

          ## 📊 Repo Health Score
          Score 0-100 with reasoning. Use 🟢🟡🔴 per category.

          ## 🟢 Whats Good
          What is working well?

          ## 🟡 Needs Attention
          Non-critical issues with file citations.

          ## 🔴 Critical Issues
          Serious problems needing immediate fix.

          ## ⚠️ Proactive Warnings
          Cross-reference findings and warn about risks.
          Each warning: cite source file, explain why, suggest fix.

          ## 💡 Suggestions
          Improvement ideas ranked by impact.

          ## 🎯 Top 3 Things To Do Right Now
          3 most important actions. Specific and actionable.
          Each with source citation and confidence level.

          End with:
          > ⚠️ AI-generated insight by GitMind v0.1.0
          > Always verify before acting on suggestions
          > Powered by the GitAgent open standard
          PROMPTEOF

          # Call Gemini API using Node.js
          node << 'NODEOF'
          const https = require('https');
          const fs = require('fs');

          const key = process.env.GOOGLE_API_KEY;
          if (!key) {
            console.error('GOOGLE_API_KEY is not set');
            process.exit(1);
          }

          const prompt = fs.readFileSync('/tmp/gitmind-prompt.txt', 'utf8');

          const data = JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: {
              temperature: 0.7,
              maxOutputTokens: 8192
            }
          });

          const encodedKey = encodeURIComponent(key);
          const options = {
            hostname: 'generativelanguage.googleapis.com',
            path: `/v1beta/models/gemini-2.0-flash:generateContent?key=${encodedKey}`,
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Content-Length': Buffer.byteLength(data)
            }
          };

          const req = https.request(options, (res) => {
            let body = '';
            res.on('data', chunk => body += chunk);
            res.on('end', () => {
              try {
                const json = JSON.parse(body);
                if (!json.candidates || !json.candidates[0]) {
                  console.error('No candidates in response');
                  console.error(body.substring(0, 500));
                  process.exit(1);
                }
                const text = json.candidates[0].content.parts[0].text;
                fs.writeFileSync('MIND.md', text);
                console.log('MIND.md written successfully');
                console.log('Lines:', text.split('\n').length);
              } catch(e) {
                console.error('Parse error:', e.message);
                console.error('Body:', body.substring(0, 500));
                process.exit(1);
              }
            });
          });

          req.on('error', e => {
            console.error('Request error:', e.message);
            process.exit(1);
          });

          req.write(data);
          req.end();
          NODEOF

      - name: Commit MIND.md
        run: |
          git config --local user.email "gitmind-bot@github.com"
          git config --local user.name "GitMind Bot"
          git add MIND.md
          git diff --staged --quiet || git commit -m "🧠 GitMind: auto-update MIND.md [skip ci]"
          git push origin main
